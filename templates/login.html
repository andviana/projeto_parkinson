{% extends 'base.html' %}

{% block title %}Login - Projeto Parkinson{% endblock %}

{% block page_title %}Autenticação de Usuário{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center py-5" style="min-height: calc(100vh - 180px);">
    <div class="col-md-5">
        <div class="card-custom border-top border-4 border-primary shadow-lg p-5">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill text-primary-blue fs-1 mb-2"></i>
                <h4 class="fw-bold text-dark-blue">Acesso ao Sistema</h4>
                <p class="text-muted small">Insira suas credenciais do Instituto Viva</p>
            </div>

            <form
                action="{{ url_for('auth.login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}"
                method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold text-dark-blue">Nome de Usuário</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0" style="border-color: var(--grey-border);">
                            <i class="bi bi-person-fill text-muted"></i>
                        </span>
                        <input type="text" class="form-control border-start-0 ps-0" id="username" name="username"
                            placeholder="Digite seu usuário" required style="border-color: var(--grey-border);">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold text-dark-blue">Senha de Acesso</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0" style="border-color: var(--grey-border);">
                            <i class="bi bi-key-fill text-muted"></i>
                        </span>
                        <input type="password" class="form-control border-start-0 ps-0" id="password" name="password"
                            placeholder="Digite sua senha" required style="border-color: var(--grey-border);">
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-navy py-2.5 fw-bold">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
                    </button>
                </div>
            </form>

            <div class="mt-4 pt-3 border-top text-center text-muted small">
                <p>Instituto Viva:</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
